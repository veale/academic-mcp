name: Build & publish Docker image (arm64)

# Builds linux/arm64 so the image runs on Asahi Linux (Apple Silicon) and
# other ARM64 servers.  The build runs under QEMU emulation on GitHub's
# x86 runners so that `uv sync` downloads the correct ARM64 wheels.
# First build: ~30–60 min.  Subsequent builds: ~5–10 min (layer + GHA cache).

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:   # allow manual triggering from the Actions UI / gh CLI

env:
  REGISTRY: ghcr.io
  # github.repository = "owner/repo", which becomes the image name
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets Docker Buildx run an ARM64 build on an x86 runner.
      # Without this, uv would download x86 wheels and the image would
      # fail on Asahi.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Produces tags:
      #   ghcr.io/owner/academic-mcp:latest  (on main branch pushes)
      #   ghcr.io/owner/academic-mcp:sha-abc1234
      #   ghcr.io/owner/academic-mcp:v1.2.3  (on version tags)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GitHub Actions cache to speed up rebuilds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
